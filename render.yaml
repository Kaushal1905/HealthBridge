services:
  # ── Backend (Flask API) ──────────────────────────────────────
  - type: web
    name: healthbridge-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false        # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false        # Set this to your Vercel frontend URL
    healthCheckPath: /
